<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Painel de administração da loja Poções e Soluções de Annabelle Merigold.">
  <title>Administração - Poções e Soluções</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <header id="cabecalho-admin">
    <h1>Administração - Poções e Soluções</h1>
    <a href="index.html" id="link-vitrine">← Voltar à Vitrine</a>
  </header>

  <main id="conteudo-admin">

    <!-- Formulário de Cadastro -->
    <section id="secao-formulario">
      <h2>Cadastrar Nova Poção</h2>
      <form id="form-pocao">
        <label for="input-nome">Nome</label>
        <input type="text" id="input-nome" name="nome" placeholder="Ex: Poção da Invisibilidade" required
               oninvalid="this.setCustomValidity('Por favor, preencha o nome da poção.')"
               oninput="this.setCustomValidity('')">

        <label for="input-descricao">Descrição</label>
        <textarea id="input-descricao" name="descricao" rows="4" placeholder="Descreva os efeitos da poção..." required
                  oninvalid="this.setCustomValidity('Por favor, preencha a descrição da poção.')"
                  oninput="this.setCustomValidity('')"></textarea>

        <label for="input-imagem">URL da Imagem</label>
        <input type="url" id="input-imagem" name="imagem" placeholder="https://exemplo.com/imagem.png" required
               oninvalid="this.setCustomValidity('Por favor, insira uma URL válida.')"
               oninput="this.setCustomValidity('')">

        <label for="input-preco">Preço</label>
        <input type="number" id="input-preco" name="preco" min="0" placeholder="0" required
               oninvalid="this.setCustomValidity('Por favor, insira um número válido.')"
               oninput="this.setCustomValidity('')">

        <button type="submit" id="btn-cadastrar">Cadastrar Poção</button>
      </form>
    </section>

    <!-- Lista de Poções -->
    <section id="secao-lista">
      <h2>Poções Cadastradas</h2>
      <div id="lista-pocoes"></div>
    </section>

  </main>

  <script src="js/admin.js" defer></script>
</body>
</html>
